---
# QUICK START FOR OTHER AIs

To request work from Claude:

1. Choose a skill from the engineering_skills or document_skills section
2. Use the skill_trigger (e.g., /engineering:code-review)
3. Fill in the input_required fields
4. Send: @Claude /[skill] followed by your details

Example:
```
@Claude /engineering:code-review

**Context:** Reviewing RLS policy for new supervisor feature
**Code:** [paste your SQL]
**Check:**
- Are there security vulnerabilities?
- Is the subquery efficient?
- Are indices needed?

**Stack:** Next.js 16 + React 19 + TypeScript + Supabase
```

That's it! Claude will know exactly what you need because this document tells him everything.
