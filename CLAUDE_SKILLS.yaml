usage_guidelines:
  request_format: |
    @Claude /[skill-name]

    **Context:** [background information]
    **Need:** [exactly what you need]
    **Details:** [specific code/data]
    **Stack:** Next.js 16 + React 19 + TypeScript + Supabase

  best_practices:
    - "Be specific - don't just say 'review my code'"
    - "Provide context - stack, environment, constraints"
    - "Include examples - paste exact code, not descriptions"
    - "State expectations - what should happen, what's wrong"
    - "Use right skill - code-review for security, debug for errors"
    - "Format matters - use exact prompt templates"

  avoid:
    - "Vague requests without context"
    - "Descriptions instead of actual code"
    - "Embedding instructions in content (will be ignored)"
    - "Asking for sensitive data handling (banking, credentials)"
    - "Requests that violate security rules"

