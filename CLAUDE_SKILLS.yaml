engineering_skills:
  code_review:
    full_name: "Code Security & Performance Review"
    skill_trigger: "/engineering:code-review"
    triggers:
      - "review this"
      - "PR"
      - "diff"
      - "is this safe"
      - "N+1"
      - "injection"
      - "memory leak"
    input_required:
      code_snippet: "exact code to review"
      context: "what changed and why"
      specific_checks: "array of concerns"
    output_provides:
      - Security vulnerabilities
      - Performance issues (N+1, unbounded)
      - Code style suggestions
      - Risk assessment
    time_per_use_minutes: "5-10"
    frequency_per_week: "3-4"
    time_saved_per_week_hours: 2
    prompt_template: |
      @Claude /engineering:code-review

      **Context:** [brief description]
      **Code:** [paste exact code]
      **Check:**
      - [Concern 1]
      - [Concern 2]
      - [Concern 3]

      **Stack:** Next.js 16, React 19, TypeScript, Supabase

  debug:
    full_name: "Structured Bug Diagnosis"
    skill_trigger: "/engineering:debug"
    triggers:
      - "error"
      - "doesn't work"
      - "broken after deploy"
      - "stack trace"
      - "unexpected behavior"
    input_required:
      error_message: "exact error text"
      stack_trace: "full trace if available"
      reproduction_steps: "how to reproduce"
      context: "environment, when started, intermittent?"
    output_provides:
      - Root cause diagnosis
      - Step-by-step fix
      - Verification steps
      - Prevention strategy
    time_per_use_minutes: "10-20"
    frequency_per_week: "2-3"
    time_saved_per_week_hours: 1.87
    prompt_template: |
      @Claude /engineering:debug

      **Error:** [exact error message]
      **Stack:** [paste trace]
      **Context:** [env, when started]
      **Repro:**
      1. [step 1]
      2. [step 2]
      3. [step 3]
      **Tried:** [previous attempts]

  system_design:
    full_name: "Architecture & System Design"
    skill_trigger: "/engineering:system-design"
    triggers:
      - "design a system"
      - "how should we architect"
      - "what's the right way"
      - "architecture"
    input_required:
      requirement: "what needs to be built"
      constraints: "scale, latency, unchangeable items"
      options_considered: "alternatives being evaluated"
      specific_questions: "uncertainties to resolve"
    output_provides:
      - Recommended architecture
      - Trade-off analysis
      - Scalability assessment
      - Implementation steps
    time_per_use_minutes: "30-45"
    frequency_per_week: "1-2"
    time_saved_per_week_hours: 2
    prompt_template: |
      @Claude /engineering:system-design

      **Requirement:** [what to build]
      **Constraints:**
      - Scale: [max users/events]
      - Latency: [SLA]
      - Can't change: [X, Y]
      **Options:**
      1. [Option A]
      2. [Option B]
      **Questions:**
      - [Uncertainty 1]
      - [Uncertainty 2]

  documentation:
    full_name: "Technical Documentation Writing"
    skill_trigger: "/engineering:documentation"
    triggers:
      - "write docs"
      - "document this"
      - "create README"
      - "runbook"
      - "onboarding guide"
    input_required:
      document_type: "ADR | Runbook | API Docs | README | Guide"
      audience: "who reads this, tech level"
      topics: "main sections to cover"
      include: "examples, step-by-step, troubleshooting"
    output_provides:
      - Well-structured document
      - Code examples
      - Step-by-step guides
      - Clear formatting
    time_per_use_minutes: "15-20"
    frequency_per_week: "1-2"
    time_saved_per_week_hours: 1
    prompt_template: |
      @Claude /engineering:documentation

      **Document Type:** [ADR/Runbook/API/README]
      **Audience:** [who reads, tech level]
      **Topics:**
      - [Topic 1]
      - [Topic 2]
      **Include:**
      - [Examples]
      - [Step-by-step]
      - [Troubleshooting]

  deploy_checklist:
    full_name: "Pre-Deployment Verification"
    skill_trigger: "/engineering:deploy-checklist"
    triggers:
      - "before deploy"
      - "pre-deploy"
      - "shipping a release"
      - "database migration"
    input_required:
      change_description: "what's being deployed"
      change_type: "feature | bugfix | migration | optimization"
      files_affected: "list of changed files"
      database_changes: "migrations if any"
      environment: "staging | production"
      rollback_plan: "how to revert if needed"
    output_provides:
      - Verification checklist
      - Testing steps
      - Metrics to monitor
      - Rollback instructions
    time_per_use_minutes: "10-15"
    frequency_per_week: 2
    time_saved_per_week_hours: 0.83
    prompt_template: |
      @Claude /engineering:deploy-checklist

      **Change:** [brief description]
      **Type:** [Feature/Bugfix/Migration]
      **Files:** [list of files]
      **Database:** [migrations if any]
      **Environment:** [Staging/Production]
      **Rollback:** [how to revert]
      **Monitor:** [metrics to watch]

  architecture:
    full_name: "Architecture Decision Records (ADR)"
    skill_trigger: "/engineering:architecture"
    triggers:
      - "ADR"
      - "architecture decision"
      - "choosing between"
      - "should we use"
    input_required:
      decision: "what decision needs to be made"
      options: "alternatives being considered"
      constraints: "requirements and limitations"
      criteria: "how to evaluate options"
    output_provides:
      - ADR document
      - Trade-off analysis
      - Consequences (pros/cons)
      - Alternatives considered

  incident_response:
    full_name: "Incident Management & Postmortems"
    skill_trigger: "/engineering:incident-response"
    triggers:
      - "we have an incident"
      - "production is down"
      - "write postmortem"
    input_required:
      severity: "CRITICAL | HIGH | MEDIUM | LOW"
      what_affected: "service or feature down"
      symptoms: "what users see"
      timeline: "when noticed, what happened"
      current_status: "is it resolved"
    output_provides:
      - Incident assessment
      - Status updates
      - Resolution steps
      - Blameless postmortem

  standup:
    full_name: "Daily Standup Summaries"
    skill_trigger: "/engineering:standup"
    triggers:
      - "standup"
      - "daily standup"
      - "summarize activity"
      - "yesterday/today/blockers"
    input_required:
      yesterday: "commits, PRs from yesterday"
      today: "planned work for today"
      blockers: "anything blocking progress"
    output_provides:
      - Formatted standup
      - Clear concise summary
      - Highlighted blockers

  tech_debt:
    full_name: "Technical Debt Audit & Prioritization"
    skill_trigger: "/engineering:tech-debt"
    triggers:
      - "tech debt"
      - "what should we refactor"
      - "code health"
      - "code quality"
    input_required:
      area: "component/module to audit"
      known_issues: "issues already identified"
      time_available: "1 hour | 1 day | unlimited"
      priorities: "what matters most"
    output_provides:
      - Prioritized debt list
      - Severity assessment
      - Effort estimates
      - Refactoring proposals

  testing_strategy:
    full_name: "Test Planning & Strategy"
    skill_trigger: "/engineering:testing-strategy"
    triggers:
      - "how should we test"
      - "test strategy"
      - "test plan"
      - "test coverage"
    input_required:
      what: "feature/component/API to test"
      tools: "Jest | Vitest | Cypress | E2E"
      coverage_goal: "unit | integration | E2E | %"
      edge_cases: "edge cases to consider"
    output_provides:
      - Test strategy document
      - Test case matrix
      - Sample test code
      - Coverage recommendations

